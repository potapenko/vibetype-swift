name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v"
        required: true
      build:
        description: "Build number / CFBundleVersion"
        required: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, notarize, and publish
    runs-on: macos-26
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
      DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
      HOLDTYPE_UPDATE_FEED_URL: ${{ secrets.HOLDTYPE_UPDATE_FEED_URL }}
      HOLDTYPE_UPDATE_PUBLIC_ED_KEY: ${{ secrets.HOLDTYPE_UPDATE_PUBLIC_ED_KEY }}
      HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
      HOMEBREW_EXPECTED_TAP: ${{ vars.HOMEBREW_EXPECTED_TAP }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      HOMEBREW_MINIMUM_MACOS: ${{ vars.HOMEBREW_MINIMUM_MACOS }}
      HOMEBREW_OFFICIAL_CASK_BUMP_ENABLED: ${{ vars.HOMEBREW_OFFICIAL_CASK_BUMP_ENABLED }}
      HOMEBREW_OFFICIAL_CASK_FORK_ORG: ${{ vars.HOMEBREW_OFFICIAL_CASK_FORK_ORG }}
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release inputs
        id: release-inputs
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            build="${{ inputs.build }}"
            tag="v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            build="${GITHUB_RUN_NUMBER}"
          fi
          if [ -z "$version" ] || [ "$version" != "${version#v}" ]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi
          {
            echo "version=$version"
            echo "build=$build"
            echo "tag=$tag"
            echo "release_dir=dist/release/$tag"
            echo "download_url_prefix=https://github.com/${GITHUB_REPOSITORY}/releases/download/$tag/"
          } >> "$GITHUB_OUTPUT"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate release inputs
        run: |
          scripts/release/validate_release_inputs.py \
            --version "${{ steps.release-inputs.outputs.version }}" \
            --build "${{ steps.release-inputs.outputs.build }}" \
            --tag "${{ steps.release-inputs.outputs.tag }}" \
            --release-dir "${{ steps.release-inputs.outputs.release_dir }}" \
            --download-url-prefix "${{ steps.release-inputs.outputs.download_url_prefix }}"

      - name: Release preflight
        run: scripts/release/preflight.py --require-secrets --require-homebrew-tap --json

      - name: Validate clean source diff
        run: git diff --check

      - name: Run tests
        run: |
          set -euo pipefail
          host_version="$(sw_vers -productVersion)"
          minimum_version="26.5"
          can_run_tests="$(
            python3 - "$host_version" "$minimum_version" <<'PY'
          import sys

          def parse(value):
              return tuple(int(part) for part in value.split("."))

          host = parse(sys.argv[1])
          minimum = parse(sys.argv[2])
          width = max(len(host), len(minimum))
          host += (0,) * (width - len(host))
          minimum += (0,) * (width - len(minimum))
          print("yes" if host >= minimum else "no")
          PY
          )"
          if [ "$can_run_tests" = "yes" ]; then
            scripts/release/with_timeout.py 2400 \
              xcodebuild \
              -project HoldType.xcodeproj \
              -scheme HoldType \
              -destination 'platform=macOS' \
              -retry-tests-on-failure \
              -test-iterations 3 \
              test
          else
            echo "Host macOS $host_version is below HoldType's $minimum_version deployment target; building test bundles without running them."
            scripts/release/with_timeout.py 2400 \
              xcodebuild \
              -project HoldType.xcodeproj \
              -scheme HoldType \
              -destination 'generic/platform=macOS' \
              build-for-testing
          fi

      - name: Import Developer ID certificate
        shell: bash
        env:
          KEYCHAIN_PASSWORD: ${{ runner.temp }}-${{ github.run_id }}
        run: |
          set -euo pipefail
          for name in \
            APPLE_TEAM_ID \
            DEVELOPER_ID_CERTIFICATE_BASE64 \
            DEVELOPER_ID_CERTIFICATE_PASSWORD \
            APP_STORE_CONNECT_KEY_ID \
            APP_STORE_CONNECT_ISSUER_ID \
            APP_STORE_CONNECT_PRIVATE_KEY \
            SPARKLE_EDDSA_PRIVATE_KEY \
            HOLDTYPE_UPDATE_FEED_URL \
            HOLDTYPE_UPDATE_PUBLIC_ED_KEY
          do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

          certificate_path="$RUNNER_TEMP/developer_id_application.p12"
          keychain_path="$RUNNER_TEMP/holdtype-signing.keychain-db"

          python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["RUNNER_TEMP"], "developer_id_application.p12").write_bytes(base64.b64decode(os.environ["DEVELOPER_ID_CERTIFICATE_BASE64"]))'

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$keychain_path"

      - name: Write notarization and Sparkle keys
        shell: bash
        run: |
          set -euo pipefail
          app_store_key_path="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          sparkle_key_path="$RUNNER_TEMP/sparkle_ed25519_key"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$app_store_key_path"
          printf '%s' "$SPARKLE_EDDSA_PRIVATE_KEY" > "$sparkle_key_path"
          chmod 600 "$app_store_key_path" "$sparkle_key_path"
          {
            echo "APP_STORE_CONNECT_API_KEY_PATH=$app_store_key_path"
            echo "SPARKLE_EDDSA_PRIVATE_KEY_FILE=$sparkle_key_path"
          } >> "$GITHUB_ENV"

      - name: Build notarized release artifacts
        run: |
          scripts/release/build_release.sh \
            --version "${{ steps.release-inputs.outputs.version }}" \
            --build "${{ steps.release-inputs.outputs.build }}"

      - name: Write release notes
        id: release-notes
        run: |
          notes="$RUNNER_TEMP/release-notes.md"
          scripts/release/write_release_notes.sh \
            --version "${{ steps.release-inputs.outputs.version }}" \
            --output "$notes"
          scripts/release/verify_release_notes.py \
            --notes-file "$notes" \
            --version "${{ steps.release-inputs.outputs.version }}"
          echo "path=$notes" >> "$GITHUB_OUTPUT"

      - name: Fetch existing appcast
        id: existing-appcast
        run: |
          existing="$RUNNER_TEMP/existing-appcast.xml"
          scripts/release/fetch_existing_appcast.py \
            --url "$HOLDTYPE_UPDATE_FEED_URL" \
            --output "$existing" \
            --timeout 60
          if [ -s "$existing" ]; then
            echo "path=$existing" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Sparkle appcast
        env:
          EXISTING_APPCAST_PATH: ${{ steps.existing-appcast.outputs.path }}
        run: |
          appcast_args=(
            --release-dir "${{ steps.release-inputs.outputs.release_dir }}"
            --download-url-prefix "${{ steps.release-inputs.outputs.download_url_prefix }}"
            --ed-key-file "$SPARKLE_EDDSA_PRIVATE_KEY_FILE"
            --release-notes-file "${{ steps.release-notes.outputs.path }}"
          )
          if [ -n "$EXISTING_APPCAST_PATH" ]; then
            appcast_args+=(--existing-appcast "$EXISTING_APPCAST_PATH")
          fi
          scripts/release/generate_appcast.sh "${appcast_args[@]}"

      - name: Verify release artifacts
        run: |
          scripts/release/verify_release.sh \
            --release-dir "${{ steps.release-inputs.outputs.release_dir }}"

      - name: Verify install channel metadata
        run: |
          scripts/release/verify_install_channels.py \
            --release-dir "${{ steps.release-inputs.outputs.release_dir }}" \
            --repository "$GITHUB_REPOSITORY" \
            --minimum-macos "$HOMEBREW_MINIMUM_MACOS"

      - name: Prune unexpected GitHub Release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          scripts/release/prune_github_release_assets.py \
            --repository "$GITHUB_REPOSITORY" \
            --version "${{ steps.release-inputs.outputs.version }}" \
            --tag "${{ steps.release-inputs.outputs.tag }}" \
            --timeout 300 \
            --apply

      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release-inputs.outputs.version }}
          TAG: ${{ steps.release-inputs.outputs.tag }}
          RELEASE_DIR: ${{ steps.release-inputs.outputs.release_dir }}
        run: |
          set -euo pipefail
          dmg="$RELEASE_DIR/HoldType-$VERSION.dmg"
          zip="$RELEASE_DIR/HoldType-$VERSION.zip"
          shasums="$RELEASE_DIR/SHA256SUMS.txt"
          manifest="$RELEASE_DIR/release-manifest.json"
          appcast="$RELEASE_DIR/appcast.xml"
          notes="${{ steps.release-notes.outputs.path }}"

          if scripts/release/with_timeout.py 300 gh release view "$TAG" >/dev/null 2>&1; then
            scripts/release/with_timeout.py 900 gh release upload "$TAG" \
              "$dmg" "$zip" "$shasums" "$manifest" "$appcast" \
              --clobber
            scripts/release/with_timeout.py 300 gh release edit "$TAG" \
              --title "HoldType $VERSION" \
              --draft=false \
              --prerelease=false \
              --notes-file "$notes"
          else
            release_create_args=(
              release create "$TAG"
              "$dmg" "$zip" "$shasums" "$manifest" "$appcast" \
              --title "HoldType $VERSION" \
              --notes-file "$notes"
            )
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              release_create_args+=(--verify-tag)
            else
              release_create_args+=(--target "$GITHUB_SHA")
            fi
            scripts/release/with_timeout.py 900 gh "${release_create_args[@]}"
          fi

      - name: Prepare Pages artifact
        run: |
          set -euo pipefail
          mkdir -p public
          cp "${{ steps.release-inputs.outputs.release_dir }}/appcast.xml" public/appcast.xml

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy appcast to Pages
        id: deploy-pages
        uses: actions/deploy-pages@v4

      - name: Verify published release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          scripts/release/verify_published_release.py \
            --repository "$GITHUB_REPOSITORY" \
            --version "${{ steps.release-inputs.outputs.version }}" \
            --appcast-url "$HOLDTYPE_UPDATE_FEED_URL" \
            --release-notes-file "${{ steps.release-notes.outputs.path }}" \
            --timeout 300 \
            --download-dmg \
            --verify-downloaded-dmg-install \
            --download-dir "$RUNNER_TEMP/published-release"

      - name: Prepare official Homebrew cask submission bundle
        if: ${{ env.HOMEBREW_MINIMUM_MACOS != '' }}
        run: |
          scripts/release/write_homebrew_cask_submission.py \
            --release-dir "${{ steps.release-inputs.outputs.release_dir }}" \
            --repository "$GITHUB_REPOSITORY" \
            --minimum-macos "$HOMEBREW_MINIMUM_MACOS" \
            --output-dir "$RUNNER_TEMP/homebrew-official-cask"

      - name: Upload official Homebrew cask submission bundle
        if: ${{ env.HOMEBREW_MINIMUM_MACOS != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: holdtype-official-homebrew-cask-${{ steps.release-inputs.outputs.version }}
          path: ${{ runner.temp }}/homebrew-official-cask
          if-no-files-found: error

      - name: Update Homebrew tap
        if: ${{ env.HOMEBREW_TAP_REPOSITORY != '' && env.HOMEBREW_TAP_TOKEN != '' && env.HOMEBREW_MINIMUM_MACOS != '' }}
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.release-inputs.outputs.version }}
          TAG: ${{ steps.release-inputs.outputs.tag }}
          RELEASE_DIR: ${{ steps.release-inputs.outputs.release_dir }}
        shell: bash
        run: |
          set -euo pipefail
          tap_dir="$RUNNER_TEMP/homebrew-tap"
          scripts/release/with_timeout.py 300 \
            git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPOSITORY}.git" "$tap_dir"
          tap_default_branch="$(
            scripts/release/with_timeout.py 300 gh repo view "$HOMEBREW_TAP_REPOSITORY" \
              --json defaultBranchRef \
              --jq '.defaultBranchRef.name'
          )"
          if [ -z "$tap_default_branch" ]; then
            echo "Could not resolve Homebrew tap default branch" >&2
            exit 1
          fi

          branch="holdtype-${VERSION}"

          dmg="$RELEASE_DIR/HoldType-$VERSION.dmg"
          sha256="$(shasum -a 256 "$dmg" | awk '{print $1}')"

          git -C "$tap_dir" checkout -B "$branch"
          scripts/release/update_homebrew_tap.sh \
            --tap-dir "$tap_dir" \
            --version "$VERSION" \
            --sha256 "$sha256" \
            --repository "$GITHUB_REPOSITORY" \
            --tap-repository "$HOMEBREW_TAP_REPOSITORY" \
            --minimum-macos "$HOMEBREW_MINIMUM_MACOS"

          git -C "$tap_dir" config user.name "github-actions[bot]"
          git -C "$tap_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$tap_dir" add Casks/holdtype.rb
          if git -C "$tap_dir" diff --cached --quiet; then
            echo "Homebrew cask already up to date"
            exit 0
          fi
          git -C "$tap_dir" commit -m "Update HoldType to $VERSION"

          export HOMEBREW_NO_AUTO_UPDATE="${HOMEBREW_NO_AUTO_UPDATE:-1}"
          export HOMEBREW_NO_INSTALL_FROM_API="${HOMEBREW_NO_INSTALL_FROM_API:-1}"
          scripts/release/with_timeout.py 300 \
            brew tap "$HOMEBREW_EXPECTED_TAP" "$tap_dir"
          scripts/release/with_timeout.py 600 \
            brew audit --cask "$HOMEBREW_EXPECTED_TAP/holdtype"

          scripts/release/with_timeout.py 300 \
            git -C "$tap_dir" push --force-with-lease origin "$branch"

          existing_pr_url="$(
            scripts/release/with_timeout.py 300 gh pr list \
              --repo "$HOMEBREW_TAP_REPOSITORY" \
              --base "$tap_default_branch" \
              --head "$branch" \
              --state open \
              --json url \
              --jq '.[0].url // ""'
          )"
          if [ -n "$existing_pr_url" ]; then
            echo "Homebrew tap pull request already exists: $existing_pr_url"
          else
            scripts/release/with_timeout.py 300 gh pr create \
              --repo "$HOMEBREW_TAP_REPOSITORY" \
              --base "$tap_default_branch" \
              --head "$branch" \
              --title "Update HoldType to $VERSION" \
              --body "Updates the HoldType cask to $TAG and pins the released DMG SHA-256."
          fi

      - name: Open official Homebrew Cask bump PR
        if: ${{ env.HOMEBREW_OFFICIAL_CASK_BUMP_ENABLED == 'true' && env.HOMEBREW_GITHUB_API_TOKEN != '' }}
        env:
          VERSION: ${{ steps.release-inputs.outputs.version }}
          RELEASE_DIR: ${{ steps.release-inputs.outputs.release_dir }}
        shell: bash
        run: |
          set -euo pipefail
          dmg="$RELEASE_DIR/HoldType-$VERSION.dmg"
          sha256="$(shasum -a 256 "$dmg" | awk '{print $1}')"
          bump_args=(
            --version "$VERSION"
            --sha256 "$sha256"
            --repository "$GITHUB_REPOSITORY"
            --timeout 900
          )
          if [ -n "$HOMEBREW_OFFICIAL_CASK_FORK_ORG" ]; then
            bump_args+=(--fork-org "$HOMEBREW_OFFICIAL_CASK_FORK_ORG")
          fi
          scripts/release/bump_official_homebrew_cask_pr.sh "${bump_args[@]}"
